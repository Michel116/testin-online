name: Build online.exe (Windows)

on:
  push:
    branches: ["main", "master", "work"]
  pull_request:
    branches: ["main", "master", "work"]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build online.exe
        run: |
          pyinstaller --noconfirm --onefile --windowed --name online main.py

      - name: Upload artifact (Actions)
        uses: actions/upload-artifact@v4
        with:
          name: online-windows-exe
          path: dist/online.exe

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/online.exe
